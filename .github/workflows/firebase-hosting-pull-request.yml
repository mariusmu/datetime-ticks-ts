name: Test and Build on PR

# This ensures the workflow only runs when a Pull Request is involved
on:
  pull_request:
    branches: [ "main", "master" ] # Add any other target branches here

jobs:
  validate-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
          # 'npm ci' is preferred for CI/CD as it's faster and stricter
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Build Project
        run: npm run build
